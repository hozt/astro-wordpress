name = "astro-wp"
compatibility_date = "2026-04-08"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Build-time variables must be declared here when wrangler.toml is present.
# Cloudflare Pages dashboard env vars are NOT passed to the build command
# when wrangler.toml exists — only to the Worker at runtime.
[vars]
API_URL = "https://hozt.hozt.com"
